<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}
.box{
width:320px;
margin:80px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px gray;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<div class="box">

<h2 align="center">Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
